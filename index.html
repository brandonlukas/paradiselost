<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14120f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Paradise Lost</title>
<style>
  :root {
    --bg: #14120f;
    --ink: #e6decf;
    --dim: #8a8172;
    --warm: #c9a35f;
    --deep-bg: #1c1915;
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    font-size: 1.15rem;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
  }
  main {
    max-width: 36rem;
    margin: 0 auto;
    padding: 14vh 1.5rem 30vh;
  }
  header { margin-bottom: 5rem; text-align: center; }
  header h1 {
    font-size: 1.05rem;
    font-weight: normal;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .whererow {
    margin-top: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }
  .whererow .arrow {
    background: none;
    border: none;
    font: inherit;
    font-size: 1.05rem;
    color: var(--dim);
    cursor: pointer;
    padding: 0.2rem 0.5rem;
    opacity: 0.6;
  }
  .whererow .arrow:hover { opacity: 1; color: var(--warm); }
  .whererow .arrow:disabled { opacity: 0.15; cursor: default; }
  #where {
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    color: var(--dim);
    cursor: pointer;
    border-bottom: 1px dotted transparent;
  }
  #where:hover { color: var(--warm); border-bottom-color: var(--warm); }
  .pageindex {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .pageindex.open { grid-template-rows: 1fr; }
  .pageindex > div { overflow: hidden; }
  .pageindex-inner { padding: 1.4rem 0 0.4rem; }
  .bookrow { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem 1.4rem; margin-bottom: 1.1rem; }
  .bookrow button {
    background: none;
    border: none;
    font: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
    cursor: pointer;
    padding-bottom: 0.15rem;
    border-bottom: 1px solid transparent;
  }
  .bookrow button:hover { color: var(--warm); }
  .bookrow button.here { color: var(--warm); border-bottom-color: var(--warm); }
  .pagegrid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    justify-content: center;
    max-width: 26rem;
    margin: 0 auto;
  }
  .pagegrid button {
    width: 2.1rem;
    height: 2.1rem;
    background: none;
    border: 1px solid rgba(201, 163, 95, 0.2);
    border-radius: 2px;
    color: var(--dim);
    font: inherit;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .pagegrid button.walked { color: var(--warm); border-color: rgba(201, 163, 95, 0.55); }
  .pagegrid button.here { background: rgba(201, 163, 95, 0.15); color: #f5eeda; }
  .pagegrid button:hover { border-color: var(--warm); color: #f5eeda; }
  .indexfoot { margin-top: 1rem; display: flex; justify-content: center; gap: 2rem; }
  .indexfoot button {
    background: none;
    border: none;
    font: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    cursor: pointer;
  }
  .indexfoot button:hover { color: var(--warm); }

  .para + .para { margin-top: 1.35rem; }

  /* the cover spread: stacked on narrow screens, plate beside Argument on wide */
  .cover {
    position: relative;
    left: 50%;
    transform: translateX(-50%);
    width: min(90vw, 33rem);
  }
  @media (min-width: 780px) {
    .cover {
      width: min(90vw, 54rem);
      display: grid;
      grid-template-columns: minmax(0, 4fr) minmax(0, 5fr);
      gap: 2.8rem;
      align-items: start;
    }
    .cover .plate { margin-bottom: 0; }
    .cover .plate img { max-width: none; }
  }

  .plate { margin-bottom: 2.4rem; }
  .plate img {
    display: block;
    width: 100%;
    max-width: 26rem;
    margin: 0 auto;
    border-radius: 2px;
  }

  .argument {
    margin-bottom: 2.8rem;
    font-size: 0.95rem;
    font-style: italic;
    color: var(--dim);
    line-height: 1.75;
  }
  .arglabel {
    display: block;
    font-style: normal;
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--warm);
    opacity: 0.7;
    margin-bottom: 0.8rem;
  }

  .unit { opacity: 0; visibility: hidden; }
  .unit.surfaced { opacity: 1; visibility: visible; transition: opacity 2s ease; }
  @media (prefers-reduced-motion: reduce) {
    .unit.surfaced { transition: none !important; }
  }

  .line {
    position: relative;
    padding: 0.1rem 0.6rem 0.1rem 2.4em;
    text-indent: -1.8em;
    border-radius: 3px;
    cursor: default;
    outline: none;
    transition: background 0.6s ease 0s, color 0.6s ease 0s;
  }
  .line.notable { cursor: pointer; }
  /* the pause: warmth arrives only if you linger */
  .line.notable:hover, .line.notable:focus-visible {
    background: rgba(201, 163, 95, 0.07);
    color: #f2ecdd;
    transition-delay: 0.35s;
  }
  .unit.open .line {
    background: rgba(201, 163, 95, 0.09);
    color: #f6f0e1;
    transition-delay: 0s;
  }
  /* line numbers, every fifth, only visible on hover of the page column */
  .line[data-n]::after {
    content: attr(data-n);
    position: absolute;
    right: -3rem;
    top: 0.15rem;
    font-size: 0.7rem;
    color: var(--dim);
    opacity: 0;
    transition: opacity 0.8s ease;
    text-indent: 0;
  }
  main:hover .line[data-n]::after { opacity: 0.45; }

  /* the bloom */
  .bloom {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .unit.open .bloom { grid-template-rows: 1fr; }
  .bloom > div { overflow: hidden; }
  .bloom-inner {
    margin: 0.9rem 0 1.4rem 2.4em;
    padding: 0 0 0 1.1rem;
    border-left: 1px solid rgba(201, 163, 95, 0.35);
    font-size: 0.92rem;
    line-height: 1.65;
    color: #c9c0ae;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s;
  }
  .unit.open .bloom-inner { opacity: 1; transform: none; }

  .sense { font-style: italic; }
  .gloss { margin-top: 0.55rem; }
  .gloss span.w {
    color: var(--warm);
    font-variant: small-caps;
    letter-spacing: 0.04em;
  }
  .gloss div { margin-top: 0.15rem; }

  .descend {
    margin-top: 0.8rem;
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--warm);
    opacity: 0.65;
    cursor: pointer;
  }
  .descend:hover { opacity: 1; }

  .deep {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .unit.deep-open .deep { grid-template-rows: 1fr; }
  .deep > div { overflow: hidden; }
  .deep-inner {
    margin-top: 0.9rem;
    padding: 0.9rem 1rem;
    background: var(--deep-bg);
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.5s ease 0.2s;
  }
  .unit.deep-open .deep-inner { opacity: 1; }
  .deep-inner p + p { margin-top: 0.6rem; }

  /* the end of the page */
  #walkon {
    margin-top: 6rem;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2.5s ease 1s;
  }
  #walkon.shown { opacity: 1; pointer-events: auto; }
  #walkon button {
    background: none;
    border: none;
    padding: 0.4rem 1rem;
    font: inherit;
    font-size: 0.85rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--warm);
    opacity: 0.7;
    cursor: pointer;
  }
  #walkon button:hover { opacity: 1; }
  #walkon .fin { font-size: 0.85rem; letter-spacing: 0.15em; color: var(--dim); }
</style>
</head>
<body>
<main>
  <header>
    <h1>Paradise Lost</h1>
    <div class="whererow">
      <button class="arrow" id="prev" aria-label="previous page">‹</button>
      <span id="where" role="button" tabindex="0" aria-expanded="false"></span>
      <button class="arrow" id="next" aria-label="next page">›</button>
    </div>
    <div class="pageindex" id="pageindex">
      <div><div class="pageindex-inner">
        <div class="bookrow" id="bookrow"></div>
        <div class="pagegrid" id="pagegrid"></div>
        <div class="indexfoot">
          <button id="restart">begin again</button>
          <button id="frontier">to the frontier</button>
          <button id="resetwalk">reset progress</button>
        </div>
      </div></div>
    </div>
  </header>
  <div id="verse"></div>
  <div id="walkon"></div>
</main>

<script src="books.js"></script>
<script>
/* annotations, keyed by Book I line number — grows page by page */
const NOTES = {
  1: {
    s: "The poem names its subject before anything else: humanity's first act of disobedience — and what grew from it.",
    g: [["fruit", "both the apple itself and its consequences — the first of the poem's countless double meanings"]],
    d: [
      "Every classical epic opens by announcing its theme in the first word or phrase: Homer's Iliad begins with <i>wrath</i>, the Odyssey with <i>the man</i>, Virgil's Aeneid with <i>arms and the man</i>. Milton answers them with <i>Man's first disobedience</i> — not a hero's deed but a failure, announcing that this epic will be about something none of theirs could touch.",
      "Notice too what's missing: a main verb. The sentence that starts here won't reach its verb until line 6. Milton suspends the grammar the way Latin poetry does, forcing you to hold the whole falling world in your head before you're told what to do with it — <i>sing</i>."
    ]
  },
  2: {
    s: "The tree of the knowledge of good and evil, whose taste brought death.",
    g: [["mortal", "death-bringing, fatal — not merely 'human'"]],
    d: [
      "The adjective is displaced: the taste isn't mortal, the tasters became mortal by it. This is a transferred epithet, a signature move of Virgil's that Milton uses constantly — the syntax itself enacts how one act contaminates everything around it."
    ]
  },
  3: {
    s: "That single taste introduced death — and every sorrow since.",
    g: [["our", "the narrator includes himself, and you"]],
    d: [
      "The quiet word here is <i>our</i>. Milton and his reader are inside this story: we are fallen readers reading about how we fell. The poem never lets you be a spectator — the woe on this line is the reason the poem needs to exist at all."
    ]
  },
  4: {
    s: "Paradise was lost — until a greater Man restores it.",
    g: [["one greater Man", "Christ, the 'second Adam'"]],
    d: [
      "St. Paul called Christ the second Adam: 'as in Adam all die, even so in Christ shall all be made alive' (1 Corinthians 15:22). Milton compresses the entire arc of Christian history — fall and redemption, the whole plot of his poem and its sequel — into a single subordinate clause before the sentence has even found its verb."
    ]
  },
  5: {
    s: "…and win back the blessed dwelling-place for us.",
    g: [["seat", "dwelling-place, home — not a chair"]],
    d: [
      "<i>Regain</i> is a word from war and conquest. Five lines in, the poem has already promised its ending: loss is not the final word. Paradise Lost is a tragedy wrapped inside a larger comedy — Milton would later write the sequel, Paradise Regained, out of this very line."
    ]
  },
  6: {
    s: "At last, the verb: Sing. The poet commands his Muse — but a heavenly one.",
    g: [["secret", "set apart, hidden (Latin secretus) — not 'confidential'"]],
    d: [
      "Six lines of suspended grammar resolve into a single imperative. Homer opened with 'Sing, goddess' — Milton delays the same word to line 6 and then aims it upward, past the nine Muses of Greek myth, at a <i>Heavenly</i> Muse: the spirit that inspired Moses and the prophets. He is claiming that his source of inspiration outranks Homer's.",
      "This is the poem's boldest running claim: that it is not fiction. Milton presents himself as a prophet taking dictation, not an author inventing."
    ]
  },
  7: {
    s: "The Muse who inspired Moses on those holy mountains.",
    g: [["Oreb… Sinai", "Horeb and Sinai — the mountains where God spoke to Moses"]],
    d: [
      "Where Greek muses lived on Helicon and Parnassus, Milton's Muse descends on the mountains of Exodus — where Moses saw the burning bush and received the Law. The 'or' is scholarly precision: the Bible uses both names, and Milton, who read scripture in Hebrew, leaves the question open like a good philologist even in mid-invocation."
    ]
  },
  8: {
    s: "That shepherd is Moses, who first taught Israel.",
    g: [["that shepherd", "Moses, tending flocks when God called him"], ["chosen seed", "the people of Israel"]],
    d: [
      "Moses was traditionally the author of Genesis — the 'first' poet of creation. Milton places himself in a line of succession that runs Moses → the prophets → himself, sidestepping Homer entirely. A blind English poet is claiming the oldest literary pedigree imaginable."
    ]
  },
  9: {
    s: "…taught how heaven and earth were created.",
    g: [["In the beginning", "the first words of Genesis, quoted verbatim"]],
    d: [
      "Milton splices the actual opening words of the Bible into his own sentence — his verse absorbs scripture mid-line without a seam. It's a demonstration of the whole poem's method: biblical text is not decoration here, it is load-bearing material."
    ]
  },
  10: {
    s: "Creation rising from Chaos — or, if the Muse prefers Jerusalem…",
    g: [["Chaos", "the formless deep before creation"], ["Sion hill", "Mount Zion, the temple mount in Jerusalem"]],
    d: [
      "<i>Chaos</i> is a Greek word — Hesiod's name for the yawning void before the gods. Genesis says the earth was 'without form.' Milton fuses the two cosmologies in a single phrase, and later in this poem Chaos will be an actual place his Satan must cross — a churning, neutral wilderness between Hell and the created world."
    ]
  },
  11: {
    s: "…or the waters of Siloam beside the temple.",
    g: [["Siloa's brook", "the pool of Siloam in Jerusalem"]],
    d: [
      "The classical muses had their sacred springs on Helicon; Milton counters with Siloam. But there's a private sting: Siloam is where Jesus sent a man born blind to wash, and the man returned seeing (John 9). The blind poet chooses, of all biblical waters, the one associated with the healing of blindness. He never says so. He just lets it flow past."
    ]
  },
  12: {
    s: "Close beside God's temple — from there I summon my aid.",
    g: [["fast by", "close beside"], ["oracle of God", "the temple in Jerusalem — a true oracle, against Delphi's false one"]],
    d: [
      "Pagan antiquity had its oracles — Delphi above all, where Apollo spoke riddles. Milton pointedly relocates the word to the Jerusalem temple, where (in his view) God actually spoke. Throughout the poem, pagan religion is treated as a distorted memory of true revelation — the fallen angels themselves will turn out to be the 'gods' of the heathen world."
    ]
  },
  13: {
    s: "I ask your help for this daring song.",
    g: [["adventurous", "venturing, full of risk — closer to 'perilous' than 'exciting'"]],
    d: [
      "Milton knows exactly how dangerous his project is: he will write speeches for God, stage debates in Hell, narrate the inside of Satan's mind. <i>Adventurous</i> admits the risk of presumption — the very sin the poem is about. The poet asking to soar is uncomfortably close to the angel who fell for aspiring too high, and Milton knows you'll notice."
    ]
  },
  14: {
    s: "This song will not fly at a modest height.",
    g: [["middle flight", "a safe, moderate course — what Icarus was told to keep"]],
    d: [
      "Daedalus warned Icarus to fly the middle course — neither too low nor too high. Milton refuses the warning outright. For a poem whose villain falls from the ultimate height, announcing 'no middle flight' is either supreme confidence or supreme irony, and Milton means you to feel both at once."
    ]
  },
  15: {
    s: "…but above Mount Helicon itself, home of the classical Muses.",
    g: [["Aonian mount", "Helicon, sacred to the nine Muses of Greek poetry"]],
    d: [
      "This is the challenge made explicit: to soar <i>above</i> the mountain of Homer and Virgil's muses is to claim his poem will surpass the Iliad and the Aeneid. No English poet had ever said this out loud. Blind, defeated politically, his cause crushed at the Restoration, Milton opens by declaring he will outdo the greatest poems ever written."
    ]
  },
  16: {
    s: "A subject no one has ever attempted.",
    g: [["rhyme", "verse — pointed, since Milton refuses actual rhyme"]],
    d: [
      "The most famous boast of originality in English — and it's borrowed. Ariosto's Orlando Furioso promised 'cosa non detta in prosa mai né in rima': a thing never said in prose or rhyme. Milton lifts the line nearly verbatim to claim unprecedented originality. Scholars still argue about whether that's a joke, a challenge, or both.",
      "And <i>rhyme</i> carries a barb: Milton prefaced the poem with an attack on rhyme itself as 'the invention of a barbarous age.' Paradise Lost is in blank verse — these lines have been refusing to rhyme at you all along."
    ]
  },
  17: {
    s: "Above all, he turns from the Muse to the Spirit of God itself.",
    g: [["Spirit", "the Holy Spirit — the invocation ascends past the Muse"]],
    d: [
      "The invocation climbs: having summoned the Heavenly Muse, Milton now goes over its head to the Spirit that moved at creation. No epic poet had dared address the third person of the Trinity as his source. If the poem is dictated by this Spirit, then Paradise Lost is — by its own account — something very close to scripture."
    ]
  },
  18: {
    s: "…a Spirit that prefers an honest heart to any temple.",
    d: [
      "Pure Protestant theology in one line: God dwells not in buildings but in believers — 'ye are the temple of God' (1 Corinthians 3:16). Milton, who spent his prose career attacking bishops and state churches, plants his anti-institutional creed right inside the invocation. The upright heart is also a quiet self-description: the blind poet offering the only temple he has."
    ]
  },
  19: {
    s: "Teach me — you were there from the beginning.",
    d: [
      "The tone drops from command to petition: <i>instruct me</i>. Homer asked the Muse for the story; Milton asks to be taught, like a pupil — or corrected, like a prophet. The half-line 'for thou know'st' is almost conversational, a blind man speaking to the presence he depends on."
    ]
  },
  20: {
    s: "Present at creation, wings spread wide…",
    d: [
      "The Spirit becomes a great bird over the primal waters. Milton is reaching for Genesis 1:2 — 'the Spirit of God moved upon the face of the waters' — but through the Hebrew verb behind 'moved,' which can mean to hover or flutter, as a bird over its nest. His Hebrew scholarship is about to surface in the next line's astonishing verb."
    ]
  },
  21: {
    s: "…brooding like a dove over the formless deep.",
    g: [["brooding", "sitting on eggs to hatch them — warming the void into life"], ["Abyss", "the bottomless deep before creation"]],
    d: [
      "<i>Brooding</i> is the most celebrated verb in the invocation: creation imagined as incubation, the universe hatched like an egg under a warm bird. The dove is also the form the Spirit took at Christ's baptism — one image binding creation to redemption.",
      "This is the line to hear aloud: the long, slow vowels of 'Dove-like sat'st brooding on the vast Abyss' force the voice to settle and hover, exactly like the bird it describes. The meter broods."
    ]
  },
  22: {
    s: "Made the void fertile — now the poet turns to his own darkness.",
    d: [
      "The colon in this line is one of the great pivots in English poetry. Before it: the creation of the universe. After it: a blind man asking for help. <i>What in me is dark</i> — Milton has been completely blind for years, composing these lines at night in his head, and here the cosmic and the personal fuse. He is asking the Spirit that lit the universe to light him."
    ]
  },
  23: {
    s: "Give light to my darkness; lift what is weak in me.",
    d: [
      "A double petition shaped like the creation itself: light where there was darkness, raising where there was formlessness. Milton asks to be re-created as the world was created. The inner light he prays for is the poem's answer to his blindness — later, in Book III, he will address light itself in the most personal passage he ever wrote."
    ]
  },
  24: {
    s: "So that, rising to the height of this great theme…",
    g: [["argument", "subject, theme (Latin argumentum) — not a quarrel"]],
    d: [
      "<i>Height</i> again — the invocation is obsessed with altitude: soaring, no middle flight, above the Aonian mount, what is low raised up. In a poem about the highest angel falling to the lowest deep, every vertical word is charged. Milton wants to rise to the height of his subject without falling the way his own Satan does."
    ]
  },
  25: {
    s: "…I may defend God's eternal design.",
    g: [["assert", "affirm and defend — vindicate, not merely state"]],
    d: [
      "<i>Providence</i> is the poem's answer to every horror it will show you: that God's design holds even through rebellion, fall, and death. <i>Assert</i> is a lawyer's word — Milton, the great pamphleteer who defended regicide before all of Europe, takes on one final case, with God as his client."
    ]
  },
  26: {
    s: "The poem's stated purpose: to justify God's ways to men.",
    g: [["justify", "show to be just — a legal and theological claim"]],
    d: [
      "The most audacious final clause in English literature. 'Theodicy' — the defense of God's justice against the evidence of evil — wasn't even a word yet (Leibniz coined it decades later); Milton states the project in plain English and spends twelve books attempting it.",
      "The line echoed for centuries. Pope softened it: 'vindicate the ways of God to man.' Housman weaponized it: 'malt does more than Milton can / To justify God's ways to man.' Whether the poem succeeds in its stated purpose — or whether Satan runs away with it — is the argument readers have been having since 1667."
    ]
  },

  /* ---- page 2 · lines 27–49 ---- */
  27: {
    s: "Now the questions begin: nothing is hidden from the Muse, in Heaven…",
    d: [
      "This is the epic question — another inherited convention. Homer asks the Muse which god set Achilles and Agamemnon quarrelling; Virgil asks why Juno hounded a good man. The poet poses the question so the Muse's answer can start the story. Milton's version asks about the origin of every human sorrow at once."
    ]
  },
  28: {
    s: "…nor even in the deep reaches of Hell — so say what cause…",
    g: [["tract", "region, expanse"]],
    d: [
      "A quiet permission slip for everything ahead: the Muse has seen Hell too, so the poem may narrate it. Milton is about to spend two entire books among devils, and this half-line is his warrant."
    ]
  },
  29: {
    s: "…moved our first parents, in their happy state…",
    g: [["grand parents", "first ancestors — Adam and Eve, not grandparents"]]
  },
  30: {
    s: "…so highly favoured by Heaven, to fall away…",
  },
  31: {
    s: "…from their Creator and break his will…",
  },
  32: {
    s: "…over a single restriction — they who were lords of all the world besides.",
    d: [
      "The crux of the whole poem stated as arithmetic: one rule, against dominion over everything else. Whether 'one restraint' was a small thing to honor or the hinge of all freedom is exactly what the poem will spend twelve books weighing."
    ]
  },
  33: {
    s: "Who first tempted them into that foul rebellion?",
    d: [
      "The epic question sharpens to a whodunnit — and the poem will answer it in the very next line. Milton doesn't want suspense about <i>who</i>; all his suspense lives in <i>how</i> and <i>why</i>."
    ]
  },
  34: {
    s: "The answer: the infernal Serpent. His guile did it…",

    s: "…gave up a matron to the mob, to prevent a worse rape.",
    d: [
      "The catalog ends on the Bible's darkest story: Judges 19, the night in Gibeah, when a mob of 'sons of Belial' surrounded a host's house demanding his male guest, and the Levite's concubine was thrust out the door to them instead — abused until morning, found dead on the threshold. 'The hospitable door exposed a matron': Milton compresses the horror into the door itself, hospitality's own boundary turned instrument of betrayal, and 'worse rape' preserves the ancient world's grim calculus that the violation of the male guest would have been the greater outrage. No thunder, no comment — the catalog of gods simply stops here, in a city street at night.",
      "And yet Belial is not finished. When the fallen host holds its great council in Book 2, he will rise second — graceful, humane-seeming, the most fluent tongue in Hell — and counsel 'ignoble ease and peaceful sloth' in periods so smooth you may catch yourself agreeing. The street thug and the silver orator are the same spirit. Tomorrow: the gods of Greece bring up the rear, and the host is marshaled."

  550: {
    s: "…in perfect phalanx-formation to the Dorian mode…",
    g: [["phalanx", "the close-ordered Greek infantry formation, shields interlocked"], ["Dorian mood", "the Dorian musical mode — grave, steady, manly; the one mode Plato allowed for warriors"]],
    d: [
      "The surprise is the music: not trumpets now but 'flutes and soft recorders.' Milton is thinking of Sparta, whose hoplites famously advanced into battle slowly, to flute music — Thucydides explains it was not piety but discipline, to keep the line steady and unhurried. And behind Sparta stands Plato, who banished all musical modes from his Republic except the Dorian, the mode of courage and self-command. Hell's army marches to the most morally approved music in classical thought. The devils are not a mob; they are the best-drilled army that ever existed, and their discipline is what makes them dreadful."

      "The general's review ends with a census — and the census is the trap. Satan counts his millions and swells with pride at the sum. The Bible's readers knew what numbering an army meant: when David counted Israel, it was itself the sin, an act of trust in force rather than God, and a plague followed (2 Samuel 24). Satan's arithmetic hardens him at the very moment it comforts him."

    g: [["small infantry", "the Pygmies — with a pun lurking in 'infantry': an army of infants"]],
    d: [
      "Here begins one of Milton's grandest maneuvers: a negative catalogue. Every great army of myth, epic, and romance is summoned — only to be dismissed as pygmies beside Satan's host. The Pygmies themselves come first, from the opening of <i>Iliad</i> Book III, where the advancing Trojans are compared to cranes flying to war against the Pygmy men. Milton takes Homer's smallest combatants as his baseline: next to the devils, <i>all</i> human armies are that small. And the pun in “small infantry” — infant-ry, an army of babies — is almost certainly deliberate."

      "The escalation is systematic: first the Giants who warred on heaven itself, then the heroes of the two founding epic cycles — Theban and Trojan — and then, for good measure, the gods who fought alongside them ('auxiliar gods,' as Athena and Ares do in Homer). Combine every giant, every hero, and every battlefield deity in the classical tradition into one host, and it still would not rate a comparison. Milton is doing to epic warfare what he did to the Olympians in the catalogue: honoring the tradition by measuring how far his subject exceeds it."

      "A private farewell hides in this line. The young Milton planned his great epic on King Arthur — he announced the project in Latin verse in his twenties. Decades later, blind and defeated, he chose the Fall of Man instead, having come to doubt both Arthur's historicity and the worth of battle-poetry. So when Arthur appears here, it is as a discard: filed under “fable or romance,” one more dwarfed comparison in another poem's simile. The epic Milton didn't write gets three lines in the one he did."

    d: [
      "The catalogue dies away in pure music — Aspramont, Montalban, Damasco, Marocco, Trebisond, Biserta, Fontarabbia — proper names chosen as much for sound as sense, the whole geography of chivalric romance chanted like a spell and dismissed. The climax bends history: Charlemagne did not fall at Roncesvalles; his rearguard did, with Roland, in the <i>Song of Roland</i>. Milton, who knew this perfectly well, lets the emperor fall with his peerage — the grander cadence wins, and in a passage about fable and romance, the fabulous version is precisely the point."

  591: {
    s: "…stood like a tower. His form had not yet lost…",
    d: [
      "Now the portrait — the most influential character-sketch in English poetry. “Stood like a tower”: three heavy stresses, the figure planted immovably at the line's start. And then the double negative that does more work than any superlative could: his form “had yet not lost <i>all</i> her original brightness.” Not 'was still bright' — the glory is stated entirely through its erosion. This is the passage that seduced the Romantics; Blake's claim that Milton was “of the Devil's party without knowing it” rests largely on the grandeur spent here. But read the grammar closely: everything great about Satan is framed as remainder, leftover, not-yet-gone."

    d: [
      "“Less than Archangel ruined” — the phrase turns on its compression. He looks exactly like what he is: the wreck of the highest order of being. Ruin, for Milton's readers, meant fallen grandeur — a word for collapsed abbeys and dead empires — and it keeps both halves alive at once: you cannot see the ruin without seeing the magnificence it fell from. The next phrase, “th' excess of glory obscured,” is stranger still: even dimmed, there is too much glory, glory in surplus. Hell's darkness has real work to do."

  599: {
    s: "…troubles the minds of kings. Darkened so, yet he still shone…",
    g: [["perplexes", "bewilders, fills with anxious doubt"]],
    d: [
      "The most dangerous lines Milton ever printed — by report. According to an early tradition (recorded by Milton's biographer John Toland), the licenser who had to approve <i>Paradise Lost</i> for the press in 1667 balked at this very simile, suspecting sedition in an eclipse that “with fear of change / Perplexes monarchs.” Eclipses were read as omens of the deaths of kings — and here was Milton, the regicide's defender, blind and lucky to be alive after the Restoration, writing about a darkened sun that makes monarchs tremble. That the poem's eclipsed sun is Satan gave him cover; that the tremor in the lines is real gave the censor his scruple. Seven years after watching his republic die, Milton smuggled the fear of kings into an epic simile — and got it past the crown's own reader."

      "“Thrice he assayed, and thrice… ” — the triple attempt is Virgil's signature gesture of grief: three times Aeneas tries to embrace his father's ghost, three times the shade slips through his arms. Milton borrows the cadence for the moment his devil breaks down. And “tears such as Angels weep” — not human tears; something rarer, whose nature we can't know — before his own army, at the sight of what his rebellion cost them. It is the most nearly redeeming moment Satan is ever given. That he masters it, swallows it, and proceeds to a speech of blame-shifting and new war is the whole tragedy in miniature: the grief is genuine, and it changes nothing."

      "“Upheld by old repute, / Consent or custom” — Satan describes God's throne in the exact vocabulary of the seventeenth-century English debate over monarchy. Repute, consent, custom: the traditional props of kingship that republicans like Milton spent the 1640s arguing were no title to rule at all. Milton, who wrote the official defense of executing Charles I, puts his own movement's language into Satan's mouth — God as a Stuart king coasting on habit and ceremony. It is the poem's most unnerving self-implication, and Milton surely means the difference to cut the other way: earthly kings hold power by custom and deserve challenging; God holds it by being the source of all being. Satan's revolution applies the right critique to the one ruler it cannot apply to."

    "'None shall partake with me' — the sacrifice and the monopoly are the same act. By forbidding all company, Satan ensures that whatever glory the voyage yields is his alone, while the prohibition wears the costume of protective generosity. Milton has built this whole scene as a dark rehearsal of Book III, where in Heaven's council the Son will volunteer, alone, to die for mankind — the true original of which this is the self-serving parody. The difference is total: the Son offers to give himself away; Satan offers to enlarge himself."

  s: "…lose all their virtue — lest bad men should boast…",
  d: [
    "One of the most startling concessions in the poem: the devils' admiration for self-sacrifice is real. The damned keep a remnant of virtue — the capacity to honor courage and generosity even when the courage is Satan's and half-counterfeit. Milton's God does not create anything wholly evil; even Hell runs on borrowed goodness.",

  s: "…as at the Olympian games or Pythian fields;…",

539: {
  s: "Others, with vast Typhon-like rage, more savage…",

    "The story is from Sophocles' <i>Women of Trachis</i> and Ovid's <i>Metamorphoses</i> IX. Hercules' wife, deceived into thinking it a love-charm, sent him a robe soaked in the centaur Nessus' poisoned blood. It burned into his flesh past all removing; in his agony the strongest man alive tore up pine trees by the roots and hurled Lichas — the blameless herald who had merely delivered the robe — into the sea. Milton chooses the myth with precision: the devils' hill-tearing violence looks like titanic power, but its true model is a hero maddened by inescapable, internal, burning pain. Their strength is their agony in motion."

  d: [
    "'Suspended Hell' — two words that stop the whole underworld. The scene descends from Orpheus, whose song in the classical underworld halted the torments of the damned: Ixion's wheel stood still, Tantalus forgot his thirst. Milton had already imagined music that 'drew iron tears down Pluto's cheek' in <i>Il Penseroso</i>. But here there is no Orpheus come down from above; the damned sing to themselves, and their own art grants them the reprieve. Milton — poet, musician's son — will not pretend the song is bad because the singers are. The harmony is real, the relief is real, and the words are lies: beauty and truth have come apart, which may be the most unsettling fact about Hell."

    "The joke is audacious: the fallen angels sit debating providence, foreknowledge, free will, and fate — precisely the questions <i>Paradise Lost</i> exists to answer, the matter of God's own discourse in Book III and of Milton's promise to 'justify the ways of God to men.' Hell holds a seminar on Milton's own subject and gets nowhere: 'no end, in wandering mazes lost.'",
