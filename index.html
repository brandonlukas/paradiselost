  s: "…forgets both joy and grief, pleasure and pain alike.",
  d: [
    "The line is built of balanced pairs — joy and grief, pleasure and pain — because that is what oblivion offers: not happiness but the cancellation of both columns of the ledger. For the damned, whose existence is now pain without remainder, wiping the whole ledger would be pure gain. Which is exactly why they will be forbidden the water."
  ]
},
587: {
  s: "Beyond this river lies a frozen continent…",
  d: [
    "Hell has been all fire until now; here Milton opens its polar hemisphere. The great precedent is Dante, whose lowest circle is not flame but ice — Cocytus, the frozen lake where traitors are locked to the chin and Satan himself stands frozen at the pit's centre. Milton, who read his Dante, builds an ice-hell too, but rather than rank fire above ice he will make the damned commute between them."
  ]
},
588: {
  s: "…dark and wild, battered by perpetual storms…",
  g: [["beat", "beaten, lashed"]]
},
589: {
  s: "…of whirlwind and dreadful hail, which on solid ground…",
  g: [["dire", "dreadful, ominous — from Latin dirus"]]
},
590: {
  s: "…never thaws, but piles up in heaps until it looks like the ruin…",
  g: [["gathers heap", "accumulates in mounds"]]
},
591: {
  s: "…of some ancient building; everything else is deep snow and ice,",
  g: [["pile", "a massive building or edifice — not a heap"]],
  d: [
    "Hail so old it resembles ruined architecture: even Hell's weather mimics fallen grandeur. The image quietly rhymes with the fallen angels themselves — magnificence collapsed into rubble and then frozen in place."
  ]
},
592: {
  s: "…a chasm as deep as that Serbonian bog…",
  g: [["Serbonian bog", "Lake Serbonis in Egypt, a vast marsh disguised under wind-blown sand"]],
  d: [
    "Lake Serbonis, on the Egyptian coast between Damietta and Mount Casius, was infamous in ancient geography: drifting sand settled on its surface until it looked like solid land, and — so Diodorus Siculus and Herodotus report — whole armies marched onto it and were swallowed. Milton loves these learned map-references in Hell; the exotic real place-name makes the imaginary landscape feel surveyed rather than dreamed."
  ]
},
593: {
  s: "…between Damietta and old Mount Casius,",
  g: [["Damiata", "Damietta, a port city on the Nile delta"], ["Mount Casius", "a mountain on the Egyptian-Syrian coast east of the Nile"]]
},
594: {
  s: "…where entire armies have sunk: there the scorching air…",
  d: [
    "The bog that ate armies leads straight into one of the poem's great paradoxes, launched by the enjambment: 'the parching air' hangs at the line-end sounding like heat, and the next line freezes it."
  ]
},
595: {
  s: "…burns with frost, and cold produces the effect of fire.",
  g: [["frore", "frosty, frozen — an archaic past participle of 'freeze'"]],
  d: [
    "'The parching air / Burns frore' — cold that burns. It is Book II's answer to Book I's 'darkness visible': Hell runs on oxymoron, each element doing its opposite's work. The paradox has real physiology behind it (extreme cold does scald like flame) and real theology: in a place defined by the perversion of everything, even fire and ice have swapped functions. Dante's frozen Cocytus stands behind the idea; the compression into five words is pure Milton."
  ]
},
596: {
  s: "The damned are dragged there by harpy-footed Furies…",
  g: [["harpy-footed", "with the talons of harpies, the snatching bird-women of Greek myth"], ["Furies", "the avenging goddesses of classical myth"], ["haled", "hauled, dragged by force"]],
  d: [
    "Milton fuses two orders of classical tormentor into one: the Furies, who punish guilt, given the clawed feet of the Harpies, who snatch. Pagan mythology is real in Milton's Hell — but demoted to staff."
  ]
},
597: {
  s: "…at fixed intervals; all the damned…",
  g: [["revolutions", "recurring cycles of time — the torment runs on a schedule"]]
},
598: {
  s: "…are brought here, and feel by turns the bitter change…"
},
599: {
  s: "…of fierce extremes — extremes made fiercer by the alternation—",
  d: [
    "The line performs its own meaning: 'fierce extremes, extremes by change more fierce' folds back on itself, the words alternating like the punishment. The rhetorical figure (chiasmus wrapped around anadiplosis) turns the verse into a shuttle moving between fire and ice. The torment is not fire, and not ice, but the change — each extreme kept unbearable by contrast with the other."
  ]
},
600: {
  s: "…hauled from beds of raging fire to freeze away in ice…",
  g: [["starve", "to perish or numb with cold — the old sense, not hunger"]],
  d: [
    "Shakespeare's Claudio, imagining damnation in <i>Measure for Measure</i>, dreads 'to bathe in fiery floods, or to reside / In thrilling region of thick-ribbed ice.' The alternation of fire and ice as torment is an old strand of Christian vision-literature reaching back to the apocryphal apocalypses; Milton systematises it into Hell's cruel commute."
  ]
},
601: {
  s: "…their soft ethereal warmth, and there to waste away…",
  g: [["ethereal", "made of ether, the pure celestial substance — angels are creatures of native warmth"], ["pine", "waste away in suffering"]]
},
602: {
  s: "…motionless, fixed fast, and frozen solid…",
  g: [["infixed", "fastened in, embedded"]],
  d: [
    "'Immovable, infixed, and frozen round' — three heavy participles nail the line shut, each more locked than the last. For spirits whose native element is motion and warmth, immobility is itself the torture: Dante's traitors, iced to the chin in Cocytus, are the model for damnation as paralysis."
  ]
},
603: {
  s: "…for long stretches of time — then hurried back to the fire.",
  g: [["periods", "long cycles or spans of time"]],
  d: [
    "The sentence that began with dragging at line 596 ends with 'thence hurried back to fire' — no rest even in torment's rhythm. Note what makes this crueller than any single punishment: hope of relief is built into the system precisely so it can be revoked, forever, on schedule."
  ]
},
604: {
  s: "They are ferried back and forth across this Lethean strait…",
  g: [["sound", "a strait or channel of water"]]
},
605: {
  s: "…both ways, so as to increase their sorrow,",
  g: [["augment", "increase"]]
},
606: {
  s: "…and as they cross they wish and struggle to reach…"
},
607: {
  s: "…the tempting stream, to lose with one small drop…"
},
608: {
  s: "…all pain and woe in sweet forgetfulness,",
  d: [
    "The whole design of this torment is proximity: the damned are ferried <i>across</i> oblivion, close enough to touch it. One drop would end everything — 'all pain and woe, / All in one moment' — and the syntax stretches the longing across three lines before the door slams: 'But Fate withstands.'"
  ]
},
609: {
  s: "…all in a single moment — and the brink is so near;"
},
610: {
  s: "…but Fate prevents it, and to block the attempt…",
  g: [["withstands", "stands in the way, opposes"]]
},
611: {
  s: "…Medusa with her Gorgon's terror guards…",
  g: [["Medusa", "the Gorgon whose gaze turned onlookers to stone"], ["Gorgonian", "petrifying — like the Gorgons of Greek myth"]],
  d: [
    "Medusa as border-guard of oblivion comes to Milton through epic tradition: in <i>Aeneid</i> VI the Gorgons haunt the vestibule of Hades, and in <i>Inferno</i> IX the demons threaten to summon Medusa to stop Dante at the walls of Dis. Her terror is petrification — and here she guards a river whose gift is dissolution of the self. The damned are held between two annihilations: turned to stone if they approach, unable to forget if they retreat."
  ]
},
612: {
  s: "…the ford; and the water itself shrinks away…"
},
613: {
  s: "…from the taste of any living creature, as once it fled…",
  g: [["wight", "creature, being — an old word for a living thing"]]
},
614: {
  s: "…the lip of Tantalus. So wandering on…",
  g: [["Tantalus", "punished in Hades with water that receded whenever he stooped to drink"]],
  d: [
    "Odysseus sees him in the underworld (<i>Odyssey</i> XI): Tantalus standing chin-deep in water that drains away at every attempt to drink. It is the myth that gave English the word 'tantalise', and Milton makes it Hell's operating principle — not deprivation, but deprivation staged an inch from relief. The water itself is animate here, fleeing 'of itself': even Hell's matter conspires in the cruelty."
  ]
},
615: {
  s: "…in confused and hopeless march, the exploring bands,",
  g: [["forlorn", "abandoned, hopeless"], ["adventurous", "venturing, exploratory — these are the scouting parties sent out at line 570"]]
},
616: {
  s: "…pale with shuddering horror, eyes aghast,",
  g: [["aghast", "struck with terror"]]
},
617: {
  s: "…saw their lamentable condition for the first time, and found…"
},
618: {
  s: "…no rest. They passed through many a dark and dreary valley,",
  d: [
    "'And found / No rest' — the sentence breaks off after two bare syllables at the head of the line. The explorers set out (back at line 570) hoping easier habitation might be found; the expedition's entire result is delivered in that blunt half-line. It echoes Scripture's restless damned: 'they have no rest day nor night' (Revelation 14:11)."
  ]
},
619: {
  s: "…and many a sorrowful region,",
  g: [["dolorous", "full of pain and grief — from Latin dolor, pain; Dante's Hell is the 'città dolente', the dolorous city"]]
},
620: {
  s: "…over many a frozen, many a fiery mountain range,",
  g: [["alp", "any high mountain — the Alps generalised into a common noun"]]
},
621: {
  s: "…rocks, caves, lakes, fens, bogs, dens, and shades of death—",
  d: [
    "Seven crushing monosyllables and then the exhale of 'and shades of death.' The line is a famous metrical tour de force: geography reduced to a pile of stony one-syllable nouns, no verbs, no connectives until the end — landscape as rubble. And the climax is biblical: the 'shadow of death' of Psalm 23 and Job, made plural and made literal. In Hell you do not walk through the valley of the shadow of death; the shades of death are simply districts on the map."
  ]
},
622: {
  s: "…a universe of death, which God by his curse…",
  d: [
    "The exploration ends in a definition, and it is one of the poem's darkest: Hell as anti-creation. Genesis gives a universe of life spoken into being and pronounced good; here is its photographic negative — 'a universe of death, which God by curse / Created evil, for evil only good.' The theology is vertiginous: God <i>created</i> this, and its only good is evil. Milton lets the paradox stand at full strength, because Hell must be God's work and yet goodness's opposite — the price of taking both providence and damnation seriously."
  ]
},
623: {
  s: "…created evil, a place for which only evil is good;"
},
624: {
  s: "…where all life dies, death lives, and Nature breeds…",
  d: [
    "'Where all life dies, death lives' — the chiasmus is the whole cosmology of Hell in six words. Every process of creation runs in reverse: living things die, dead things thrive, and Nature — the great mother of Book VII's creation — becomes a breeder of monsters. The line quietly prepares us for what waits at Hell's gate: a personified Death who is very much alive, and a birth-scene more perverse than anything in this catalogue."
  ]
},
625: {
  s: "…perverse things — all monstrous, all unnatural,",
  g: [["prodigious", "unnatural, ominous — a prodigy was a monstrous birth read as an omen"]]
},
626: {
  s: "…abominable, unspeakable, and worse…",
  g: [["Obominable", "abominable (an old spelling)"], ["inutterable", "unspeakable"]]
},
627: {
  s: "…than fable ever invented or fear imagined:",
  g: [["feigned", "invented, imagined — the old word for poetic fiction"]]
},
628: {
  s: "…Gorgons, and Hydras, and dire Chimeras.",
  g: [["Gorgons", "snake-haired sisters whose gaze petrified"], ["Hydras", "the many-headed serpent Hercules fought — two heads grew for each cut off"], ["Chimeras", "the fire-breathing hybrid of lion, goat, and serpent"]],
  d: [
    "The line is lifted almost bodily from Virgil: in <i>Aeneid</i> VI the vestibule of Hades houses Gorgons, Harpies, and the Chimera. But Milton has just told us Hell's monsters are 'worse / Than fables yet have feigned' — so this famous mythological roll-call is offered as an <i>understatement</i>, the best that pagan imagination could do. The classics supply the vocabulary of horror; Hell exceeds the vocabulary. The triple 'and' gives the line its incantatory swing — three monsters tolling like a bell to close the page."
  ]
},
629: {
  s: "Meanwhile the Adversary of God and Man,",
  g: [["Adversary", "the literal meaning of the Hebrew name 'Satan'"]],
  d: [
    "The camera cuts from the damned masses back to their leader, and the epithet is a translation: <i>satan</i> is Hebrew for 'adversary'. Milton often plants the meaning of a name beside the name itself — Satan is not a person who happens to oppose; opposition is what he is called and all he is."
  ]
},
630: {
  s: "…Satan, his thoughts on fire with his supreme design,",
  g: [["highest design", "the grand plan — to escape Hell and ruin God's new creation"]]
},
631: {
  s: "…puts on swift wings, and toward the gates of Hell…"
},
632: {
  s: "…pursues his solitary flight: sometimes…",
  g: [["Explores", "tries out, tests — the Latin sense of explorare, to search out"]],
  d: [
    "'His solitary flight' — while the legions built a capital and held games to pass the time, the leader travels alone. Milton keeps stressing Satan's isolation; the heroism he claims is real in its daring, but its condition is that no one shares it. The verb 'explores' still carries its Latin force: this is reconnaissance into the absolutely unknown."
  ]
},
633: {
  s: "…he skims along the right-hand coast, sometimes the left;",
  g: [["scours", "moves swiftly along, sweeping"]]
},
634: {
  s: "…now shaves the deep with level wing, then soars…",
  g: [["shaves", "skims closely, grazes"]]
},
635: {
  s: "…up to the fiery vault towering high above.",
  g: [["concave", "the arched roof of Hell, curving overhead like an inverted bowl"]],
  d: [
    "Four lines give Satan's flight the full range of Hell's vertical space — skimming the burning lake, soaring to the burning roof — and the verse swoops with him. Milton loved describing flight (no poet before the age of flight did it better), and these alternating dips and climbs are a pilot's-eye rendering of a whole cavernous world."
  ]
},
636: {
  s: "As when, far off at sea, a fleet sighted on the horizon…",
  g: [["descried", "sighted, spotted from afar"]],
  d: [
    "Here begins one of the poem's most quoted similes: Satan flying through Hell is like a merchant fleet seen far off at sea, seeming to hang in the clouds. The comparison is startlingly modern for an epic — not eagles or gods but East Indiamen, the great cargo ships of Milton's own century, riding the monsoon home with spices. The far-off fleet that 'hangs in the clouds' is an exact optical observation: distant ships at the horizon do appear suspended in air."
  ]
},
637: {
  s: "…seems to hang in the clouds, sailing close-hauled on the trade winds…",
  g: [["equinoctial winds", "the trade winds near the equator — or the monsoons of the equinox season"]]
},
638: {
  s: "…from Bengal, or the islands…",
  g: [["Bengala", "Bengal, on the northeast coast of India"]]
},
639: {
  s: "…of Ternate and Tidore, from which merchants bring…",
  g: [["Ternate and Tidore", "two tiny volcanic islands in the Moluccas — the fabled Spice Islands of the East Indies"]],
  d: [
    "Ternate and Tidore were two clove-bearing specks in the Moluccas over which Portugal, Spain, Holland and England fought for a century — among the most valuable real estate on Earth in Milton's lifetime. The names would have glittered for his first readers the way 'gold rush' place-names glittered later. Choosing them makes Satan's expedition a <i>commercial venture</i>: he too is sailing to plunder a rich, distant, newly discovered world — ours."
  ]
},
640: {
  s: "…their spice cargoes; the ships on the trading sea…",
  g: [["drugs", "aromatic goods, spices — no narcotic sense; any prepared commodity"]]
},
641: {
  s: "…sail through the wide Indian Ocean toward the Cape,",
  g: [["Ethiopian", "the Indian Ocean, called the Ethiopian Sea in old geography"], ["the Cape", "the Cape of Good Hope, at Africa's southern tip"]]
},
642: {
  s: "…pressing on by night toward the pole star: so seemed…",
  g: [["Ply stemming", "keep pressing forward against wind and current — 'stem' is to breast the waves"]]
},
643: {
  s: "…the flying Fiend, far off. At last there appear…",
  d: [
    "The simile snaps shut in four words: 'the flying Fiend.' After six lines of moonlit rigging and spice-routes we are reminded what the beautiful distant object actually is. It is Milton's signature move with similes — expand into a whole gorgeous world, then close with a clang. Critics have long noticed the aptness beneath the beauty: merchants sail for profit, and Satan's voyage to Eden is the ultimate hostile takeover, with mankind as the cargo."
  ]
},
644: {
  s: "…the bounds of Hell, reaching high up to the horrid roof,",
  g: [["horrid", "bristling — the Latin sense; a roof jagged with rock and fire"]]
},
645: {
  s: "…and the gates, three times threefold: three layers were brass,",
  d: [
    "'Thrice threefold' — nine gates in three sets of three, of ascending impregnability: brass, iron, adamant. Virgil's Tartarus stands behind them, with its gate and columns of solid adamant that no force of men or gods can breach (<i>Aeneid</i> VI), and Dante's ninefold circles echo in the arithmetic. Milton's Hell is built as a maximum-security prison — which makes it matter enormously who holds the key."
  ]
},
646: {
  s: "…three iron, three of adamantine rock,",
  g: [["adamantine", "of adamant, the mythical unbreakable substance — the word behind 'diamond'"]]
},
647: {
  s: "…impenetrable, ringed round with circling fire…",
  g: [["impaled", "fenced in, palisaded — encircled as with stakes"]]
},
648: {
  s: "…yet unconsumed. Before the gates there sat…",
  d: [
    "'Yet unconsumed' — fire that burns without consuming, the infernal parody of the burning bush of Exodus, where God spoke from flame that did not devour. In Hell every divine sign has its inverted double. And now, with the gates established, Milton unveils the two doorkeepers — the strangest figures in the entire poem."
  ]
},
649: {
  s: "…on either side, a formidable Shape.",
  d: [
    "'Shape' is doing deliberate work: not 'figure', not 'being' — something whose category is unclear. With these two gatekeepers Milton shifts mode entirely, from epic narrative into allegory: the persons Satan is about to meet are Sin and Death themselves, in a family drama built out of the Epistle of James — 'lust, when it hath conceived, bringeth forth sin: and sin, when it is finished, bringeth forth death' (James 1:15)."
  ]
},
650: {
  s: "One of them seemed a woman down to the waist, and beautiful,",
  d: [
    "The woman-above, monster-below figure has a long pedigree: the serpent-woman Echidna in Hesiod's <i>Theogony</i>, mother of monsters; and nearest to Milton, Spenser's Errour in <i>The Faerie Queene</i> (I.i), 'Halfe like a serpent horribly displaide, / But th' other halfe did womans shape retaine', surrounded by her brood. Milton's design makes the shape an emblem of sin itself: alluring at first approach, foul in the consequence — you meet the fair half before the scaly half."
  ]
},
651: {
  s: "…but ended foul in many a scaly coil,",
  g: [["fold", "coil of a serpent's body"]]
},
652: {
  s: "…voluminous and vast — a serpent armed…",
  g: [["Voluminous", "in great winding rolls — the Latin volumen, a coil or scroll"]]
},
653: {
  s: "…with a deadly sting. Round about her middle…",
  g: [["mortal", "death-dealing"]]
},
654: {
  s: "…a pack of Hell-hounds barked without ceasing,",
  g: [["cry", "a pack of hounds — the hunting term"], ["Cerberean", "like Cerberus, the three-headed watchdog of Hades"]],
  d: [
    "The hounds around Sin's waist announce her literary ancestor: Scylla, whom Ovid describes transformed by Circe's poison so that barking dogs sprouted from her loins (<i>Metamorphoses</i> XIV). But Milton adds the detail that turns myth into nightmare — his hounds can crawl back <i>inside</i> her womb and keep barking, unseen, within."
  ]
},
655: {
  s: "…with wide Cerberean mouths, full loud, and rang…"
},
656: {
  s: "…a hideous peal; yet when they chose, they would creep—",
  g: [["list", "please, choose — 'when they wished'"]]
},
657: {
  s: "…if anything disturbed their noise — back into her womb,"
},
658: {
  s: "…and kennel there; yet even there they still barked and howled,",
  g: [["kennel", "take shelter as in a doghouse — the word made horrible by its location"]],
  d: [
    "The most appalling detail in the portrait: her offspring retreat into her womb and go on howling inside. This is allegory with the pressure of nightmare — sin's consequences returning to gnaw their source from within, remorse as a continuous interior noise. We will learn on a later page that these hounds are her sons by her own son Death, hourly born and hourly devouring: the incestuous family tree of evil, generating and consuming itself."
  ]
},
659: {
  s: "…unseen within. Far less abhorrent than these…"
},
660: {
  s: "…were the dogs that tormented Scylla, bathing in the sea that parts…",
  g: [["Scylla", "the nymph Circe transformed into a monster ringed with barking dogs; she preyed on sailors in the strait of Messina"], ["Vexed", "tormented"]],
  d: [
    "In Ovid (<i>Metamorphoses</i> XIV), the jealous enchantress Circe poisons the pool where the nymph Scylla bathes; Scylla wades in and finds her lower body a girdle of raging dog-heads. She becomes the man-eating terror of the strait between Italy and Sicily that Odysseus and Aeneas must pass. Milton cites her only to outbid her — his monster is worse — the same rhetorical move as 'worse than fables yet have feigned'."
  ]
},
661: {
  s: "…Calabria from the hoarse Sicilian shore;",
  g: [["Trinacrian", "Sicilian — Trinacria, 'three-cornered', the ancient name for triangular Sicily"], ["hoarse", "roaring with surf"]]
},
662: {
  s: "…nor is an uglier crew in the train of the night-hag, when, summoned…",
  g: [["night-hag", "a witch or demoness who rides the night air — folklore's nightmare-bringer"]],
  d: [
    "From classical myth Milton pivots to northern folklore: the night-hag summoned by secret rites, riding the air, drawn by the smell of infants' blood to dance with Lapland witches. Lapland was seventeenth-century Europe's byword for sorcery — its shamans were reputed to sell winds to sailors and traffic with spirits. The two comparisons bracket Sin between the Mediterranean's monsters and the Arctic's witches: all the world's traditions of female horror, and she exceeds them all."
  ]
},
663: {
  s: "…in secret, she comes riding through the air,"
},
664: {
  s: "…lured by the smell of infant blood, to dance…"
},
665: {
  s: "…with Lapland witches, while the labouring moon…",
  g: [["labouring", "suffering eclipse — the Latin luna laborans; witches were believed to torment the moon with spells"]]
},
666: {
  s: "…is eclipsed by their charms. The other Shape—",
  d: [
    "The classical belief that witches could drag down or eclipse the moon by incantation runs from Virgil's eclogues through every Renaissance treatment of sorcery; the moon 'labours' — the Roman phrase for lunar eclipse — under their spells. And then the dash, and the turn: 'The other Shape—'. Milton has spent seventeen lines on Sin. What sits opposite her will defeat description itself."
  ]
},
667: {
  s: "…if it could be called a shape, that had no shape…",
  d: [
    "'If shape it might be called that shape had none' — the most famous line in the portrait of Death, and a definition built entirely of self-cancellation. Milton describes Death the way negative theology describes God: by saying what it is not. Every phrase in the passage withdraws itself as it is uttered — shape without shape, substance that seems shadow, 'for each seemed either'. Where Sin was excessively describable (woman, serpent, hounds, myth upon myth), Death is the failure of description — which is precisely what death is to the living imagination. Coleridge singled out this passage as the height of the sublime: terror produced not by an image but by the impossibility of forming one."
  ]
},
668: {
  s: "…distinguishable in member, joint, or limb;"
},
669: {
  s: "…or substance, if it could be called that, which seemed shadow,"
},
670: {
  s: "…for it seemed either one — black it stood as Night,",
  d: [
    "The similes finally arrive, and they are all abstractions: black as Night, fierce as ten Furies, terrible as Hell. Death can only be compared to other unpicturable things. Even the intensifier is unstable — why <i>ten</i> Furies, when myth counts three? Because number, like shape, breaks down here."
  ]
},
671: {
  s: "…fierce as ten Furies, terrible as Hell,"
},
672: {
  s: "…and it shook a dreadful dart; what seemed to be its head…",
  g: [["dart", "a light spear or javelin — Death's traditional weapon"]]
},
673: {
  s: "…wore the likeness of a kingly crown.",
  d: [
    "Out of the formless blackness, two attributes resolve: a dart and a crown — the weapon and the emblem of rule. Both come from Scripture: 'the sting of death' (1 Corinthians 15) and the rider on the pale horse whose name is Death, to whom power was given (Revelation 6). But note Milton's triple hedge: 'what <i>seemed</i> his head / The <i>likeness</i> of a kingly crown had on.' Even Death's kingship is a seeming — he reigns, as we are about to hear him boast, only over a prison. The portrait complete, the poem now sets this thing in motion, straight at Satan."
  ]
},
674: {
  s: "Satan was now close, and from his seat…"
},
675: {
  s: "…the monster came moving toward him just as fast,"
},
676: {
  s: "…with horrid strides; Hell trembled as he strode.",
  d: [
    "'Hell trembled as he strode' — five words, mostly monosyllables, and the ground shakes. The half-line has the compression of Homer's earth groaning under armies. When the two meet, Milton will remark that Hell 'grew darker at their frown': the landscape registers these beings seismically, like instruments too crude to measure them any other way."
  ]
},
677: {
  s: "The undaunted Fiend wondered what this might be—",
  g: [["admired", "wondered at, marvelled — the Latin admirari; no note of approval"]]
},
678: {
  s: "…wondered, but did not fear (God and his Son excepted,",
  d: [
    "The parenthesis is a character summary: Satan values and shuns nothing created — only God and the Son register on his scale at all. It is magnificent and damning at once, courage indistinguishable from the pride that caused his fall. Milton repeats 'admired' across the line-break ('admired— / Admired, not feared') to make sure we do not mistake wonder for alarm."
  ]
},
679: {
  s: "…no created thing did he value or avoid),"
},
680: {
  s: "…and with a disdainful look he spoke first:"
},
681: {
  s: "“Where do you come from, and what are you, execrable Shape,",
  g: [["execrable", "accursed, detestable — from Latin execrari, to curse"]],
  d: [
    "'Whence and what art thou' — the challenge of every epic hero to every monster at every gate. But the dramatic irony is enormous: Satan is demanding the identity of his own son. He genuinely does not know — and the whole terrible family history is about to be explained to him."
  ]
},
682: {
  s: "…that dare, however grim and terrible, thrust…"
},
683: {
  s: "…your misshapen face across my path…",
  g: [["miscreated", "wrongly made, malformed"], ["front", "forehead, face — Latin frons"], ["athwart", "across"]]
},
684: {
  s: "…to those gates over there? Through them I intend to pass—"
},
685: {
  s: "…be assured of that — without asking your leave."
},
686: {
  s: "Get back; or taste your folly, and learn by experience,",
  g: [["by proof", "by trial, by hard experience"]]
},
687: {
  s: "…Hell-born thing, not to contend with Spirits of Heaven.”",
  d: [
    "'Hell-born, not to contend with Spirits of Heaven' — Satan still claims Heaven as his identity and hurls 'Hell-born' as the insult. Death will fling the taunt straight back ('and reckon'st thou thyself with Spirits of Heaven, / Hell-doomed'). The two of them arguing over who belongs to Hell is grimly comic — and neither knows they are father and son."
  ]
},
688: {
  s: "To him the Goblin, full of wrath, replied:",
  g: [["Goblin", "evil spirit, demon — a stronger word in Milton's day than in ours"]]
},
689: {
  s: "“Are you that traitor Angel? Are you the one…",
  d: [
    "Death, unlike Satan, knows exactly whom he is addressing — and his opening is a prosecutor's indictment. 'Art thou that traitor Angel?' strips away every title Satan has accumulated in Hell and files him under his crime. It is the poem's blunt counter-voice to two books of Satanic self-presentation: to everyone outside his own party, he is simply the one who broke the peace."
  ]
},
690: {
  s: "…who first broke the peace of Heaven — and its faith, till then…"
},
691: {
  s: "…unbroken — and in proud rebellious arms…"
},
692: {
  s: "…drew after him a third of Heaven's sons,",
  d: [
    "'The third part of Heaven's sons' comes from Revelation 12:4 — the dragon whose tail 'drew the third part of the stars of heaven, and did cast them to the earth.' The fraction recurs through the poem as the fixed statistic of the rebellion. Even Death cites Scripture."
  ]
},
693: {
  s: "…sworn together against the Highest — for which both you…",
  g: [["Conjured", "sworn together in conspiracy — Latin coniurare; stress on the second syllable"]]
},
694: {
  s: "…and they, cast out from God, are condemned here…"
},
695: {
  s: "…to waste away eternal days in woe and pain?"
},
696: {
  s: "And do you count yourself among the Spirits of Heaven,"
},
697: {
  s: "…you Hell-doomed thing, breathing defiance and scorn here,",
  g: [["Hell-doomed", "sentenced to Hell — answering Satan's sneer of 'Hell-born'"]]
},
698: {
  s: "…where I reign as king — and, to enrage you further,"
},
699: {
  s: "…your king and lord? Back to your punishment,",
  d: [
    "'Where I reign king, and, to enrage thee more, / Thy king and lord' — Death pulls rank, and the clause 'to enrage thee more' shows he is needling deliberately. There is real theological point under the taunt: within Hell, Death does outrank Satan — the punisher above the punished. Satan escaped one monarchy only to find another at the exit."
  ]
},
700: {
  s: "…false fugitive; and add wings to your speed,",
  g: [["fugitive", "runaway — deserter both from Heaven and now from his prison"]]
},
701: {
  s: "…lest I pursue your lingering with a whip of scorpions,",
  g: [["whip of scorpions", "a biblical threat — Rehoboam's 'I will chastise you with scorpions' (1 Kings 12)"]],
  d: [
    "The 'whip of scorpions' is Rehoboam's threat to Israel in 1 Kings 12:11: 'my father hath chastised you with whips, but I will chastise you with scorpions.' In the Bible it is a tyrant-king's promise of harsher rule — exactly the register Death wants, king of Hell threatening a fugitive subject."
  ]
},
702: {
  s: "…or lest with one stroke of this dart…"
},
703: {
  s: "…strange horror seize you, and pangs never felt before.”",
  d: [
    "'Pangs unfelt before' is a real threat even to an immortal: Satan has known burning, defeat, despair — but not death, whatever death could mean for an angel. The menace lies in the unknown. The page ends with the ultimatum delivered; the next opens with Death swelling to strike."
  ]
},
704: {
  s: "So spoke the grisly Terror; and in size and shape,",
  g: [["grisly", "horrifying, ghastly"]]
},
705: {
  s: "…even as he spoke and threatened, he grew tenfold…",
  d: [
    "Death grows tenfold in the act of threatening — and can, because he has no fixed shape to constrain him. The formlessness of the portrait pays off as narrative: a thing that is 'likest a shadow' can be any size its menace requires. Fear works the same way; so does death itself, which is exactly as large as the mind confronting it makes it."
  ]
},
706: {
  s: "…more dreadful and deformed. On the other side,",
  g: [["deform", "deformed, hideous — the adjective, from Latin deformis"]]
},
707: {
  s: "…burning with indignation, Satan stood…"
},
708: {
  s: "…unterrified, and blazed like a comet…",
  d: [
    "Satan answers Death's swelling with fire: 'like a comet burned.' Comets were the seventeenth century's most dreaded celestial omens — portents of plague, war, and the fall of kingdoms — and Milton's readers had seen great ones in 1618 and 1664–65, the latter followed within months by plague and the Fire of London. The simile makes Satan a disaster in the sky, beautiful, unignorable, and boding ruin to whoever watches."
  ]
},
709: {
  s: "…a comet that fires the whole length of the huge constellation Ophiuchus…",
  g: [["Ophiuchus", "the Serpent-Bearer, a vast northern constellation — Greek for 'snake-holder'"]],
  d: [
    "The constellation is chosen with a smile: Ophiuchus is the Serpent-Bearer, a giant gripping a snake across a vast stretch of the northern sky. A comet blazing through the Serpent-Bearer is the perfect heraldry for Satan — who will shortly carry the serpent in a more intimate sense, wearing it into Eden."
  ]
},
710: {
  s: "…in the arctic sky, and from its horrid tail-streams…",
  g: [["horrid hair", "the comet's tail — 'comet' comes from Greek kometes, 'long-haired star'; horrid keeps its Latin sense, bristling"]]
},
711: {
  s: "…shakes down pestilence and war. Each aimed at the other's head…",
  d: [
    "'Shakes pestilence and war' — the exact freight comets were believed to carry. The phrase 'horrid hair' is a bilingual pun: <i>kometes</i> is Greek for 'long-haired', so the comet's tail is literally its hair, 'horrid' in the Latin sense of bristling. Milton's astronomy and etymology are load-bearing at once — and the line's shudder needs neither to work."
  ]
},
712: {
  s: "…his deadly blow; their fatal hands…"
},
713: {
  s: "…intend no second stroke; and such a frown…",
  d: [
    "'Their fatal hands / No second stroke intend' — each means to kill with one blow. The compression is the menace: no fencing, no exchange, a single mutual annihilation held in suspension. Milton then freezes the instant and pours in a weather-front."
  ]
},
714: {
  s: "…each cast at the other, as when two black clouds,",
  d: [
    "The duel-that-never-happens gets one of the poem's great similes: two thunderheads charged with 'heaven's artillery', rolling toward each other over the Caspian — a sea proverbial among the old geographers for storms — then stopping, front to front, hovering, waiting for the wind's signal. It is an image of pure suspended violence: all the destruction is potential, none released. The poised clouds hold the scene's whole physics — two powers so equal that only an outside force can decide the encounter. That outside force is about to arrive, and it will be a voice, not a wind."
  ]
},
715: {
  s: "…loaded with heaven's artillery, come rattling on…",
  g: [["fraught", "loaded, freighted — a cargo word"], ["heaven's artillery", "thunder and lightning"]]
},
716: {
  s: "…over the Caspian Sea — then stand front to front,",
  g: [["the Caspian", "a sea famous in old geography for sudden violent storms"]]
},
717: {
  s: "…hovering for a time, till winds blow the signal…"
},
718: {
  s: "…for them to join their dark encounter in mid-air."
},
719: {
  s: "So frowned the mighty combatants, so that Hell…"
},
720: {
  s: "…grew darker at their frown; so evenly matched they stood;",
  d: [
    "'Hell grew darker at their frown' — in a place already dark, their anger registers as a further subtraction of light. The conceit belongs with 'darkness visible': Hell's atmosphere is an emotional instrument, dimming and trembling with its principals."
  ]
},
721: {
  s: "…for never — except once more — was either destined…",
  g: [["wither", "'either' in most editions — each of the two combatants"]]
},
722: {
  s: "…to meet so great a foe. And now great deeds…",
  d: [
    "'Never but once more' is a trapdoor into the future: each of these two will face one greater opponent, once. The reference is to Christ — who drives Satan from Heaven at the end of the war in Book VI, and who at the world's end destroys Death itself: 'the last enemy that shall be destroyed is death' (1 Corinthians 15:26). One quiet parenthesis sets this whole snarling standoff inside the larger plot, where both combatants lose."
  ]
},
723: {
  s: "…would have been done, deeds all Hell would have rung with,"
},
724: {
  s: "…had not the snaky Sorceress who sat…",
  g: [["Sorceress", "Sin — named here by her serpent half and her uncanny power"]]
},
725: {
  s: "…close by Hell-gate, keeper of the fatal key,",
  g: [["fatal", "charged with fate, fateful — not merely deadly"]],
  d: [
    "'The fatal key' — here is the detail on which the epic's plot turns. The gates are ninefold and impenetrable; but Sin holds the key, given to her (we will learn) by God's own command. Everything Satan wants runs through this creature he does not recognise. 'Fatal' keeps its full Latin weight: the key is an instrument of fate — what it unlocks is the road to Eden and the Fall."
  ]
},
726: {
  s: "…risen, and rushed between them with a hideous outcry.",
  d: [
    "The duel of titans is stopped by the oldest scene in literature: a woman throwing herself between two combatants. But this version is warped past recognition — the peacemaker is a serpent-woman, and the fighters she parts are, though only she knows it, her father and her son. The page ends on her scream; the next opens with the words that stop Death's dart mid-air."
  ]
},
727: {
  s: "“O father, what does your hand intend,” she cried,",
  d: [
    "'O father' — the first word of her speech detonates the scene. Satan, who demanded 'Whence and what art thou' of one stranger, now hears himself claimed as parent by the other. In two lines Sin reframes the cosmic standoff as a domestic horror: a father and son at each other's throats, and a mother-daughter shrieking between them. No moment in the poem mixes the epic and the grotesque more daringly."
  ]
},
728: {
  s: "…“against your only son? What fury, O son,",
  g: [["fury", "madness — with a glance at the Furies, spirits of family bloodshed"]]
},
729: {
  s: "…possesses you, to aim that deadly dart…"
},
730: {
  s: "…at your father's head? And do you know for whose sake?",
  d: [
    "'And know'st for whom?' — Sin's rhetorical masterstroke. Fighting each other, she says, they would only be doing God's work for him: He sits above and laughs while His enemies destroy one another. The family quarrel is dissolved by identifying a common enemy — the logic of every criminal alliance, and the exact glue that will bind this trio into their unholy anti-Trinity."
  ]
},
731: {
  s: "…for him who sits on high and laughs the while…",
  d: [
    "'He that sitteth in the heavens shall laugh: the Lord shall have them in derision' — Psalm 2, the psalm of rebel kings conspiring against the Lord's anointed. Sin quotes Scripture with perfect accuracy and perfect bitterness: in her telling, the laughter of Psalm 2 is not majesty but mockery, and God's justice merely 'his wrath, which he calls justice.' The family resemblance to her father's rhetoric is total — she was born from his head, and she argues with his voice."
  ]
},
732: {
  s: "…at you, ordained to be his drudge, executing…",
  g: [["drudge", "menial slave — Death as God's unpaid executioner"]]
},
733: {
  s: "…whatever his wrath — which he calls justice — commands:"
},
734: {
  s: "…that wrath which will one day destroy you both!”",
  d: [
    "Sin's prophecy is truer than she knows: God's purpose will indeed finish them both — 'and death and hell were cast into the lake of fire' (Revelation 20:14). She offers it as a reason for alliance; the poem lets it stand as the alliance's verdict. Every prediction made in Hell comes true in the wrong direction."
  ]
},
735: {
  s: "She spoke; and at her words the hellish Plague…",
  g: [["Pest", "plague, pestilence — Latin pestis; Death as walking epidemic"]]
},
736: {
  s: "…held back. Then Satan answered her:",
  g: [["Forbore", "refrained, held off"]]
},
737: {
  s: "“So strange is your outcry, and so strange the words…"
},
738: {
  s: "…you interpose, that my hand, poised to strike,",
  g: [["interposest", "thrust between — she has interposed her body and her words alike"]]
},
739: {
  s: "…is stayed, and holds off from showing you by deeds…",
  g: [["Prevented", "forestalled, stopped beforehand — the Latin sense of praevenire"]]
},
740: {
  s: "…what it intends, until I first learn from you…"
},
741: {
  s: "…what kind of thing you are, so double-formed, and why,",
  d: [
    "'What thing thou art, thus double-formed' — Satan repeats his gatekeeper-challenge, but now with an incredulous domestic edge: this double-shaped thing has just called him father. The word 'double-formed' also quietly names what Sin allegorically is — duplicity itself, fair face and foul body, the two-formed nature of every temptation."
  ]
},
742: {
  s: "…meeting me first in this infernal valley, you call…"
},
743: {
  s: "…me father, and call that phantasm my son.",
  g: [["phantasm", "apparition, unreal spectre — Satan denies Death even the dignity of substance"]]
},
744: {
  s: "I do not know you, and never until now have I seen…",
  d: [
    "'I know thee not' — Peter's words denying Christ, here spoken by Satan denying his own daughter. The disavowal is also, allegorically, exact: the sinner never recognises his sin as his own offspring. Milton's plot literalises the psychology — Satan really did father this creature, really has forgotten, and really finds his own progeny 'detestable'. Evil cannot bear the sight of its consequences."
  ]
},
745: {
  s: "…a sight more detestable than the two of you.”",
  d: [
    "'Sight more detestable than him and thee' — Satan ends by loathing what came out of him, father recoiling from daughter and grandson-son alike. The dramatic irony is at maximum pressure: we know something monstrous connects these three, but not yet how. Sin's answer — the strangest birth-story in English poetry, and the memory Satan has suppressed — is tomorrow's page."
  ]
},

746: {
  s: "To him the Portress of Hell-gate replied:",
  g: [["Portress", "female gatekeeper — Sin holds the office formally, like a warden with a royal commission"]],
  d: [
    "Satan has just called her a ‘detestable sight’ and asked what she is. Her answer — the autobiography that follows — is one of the strangest and most brilliant set pieces in the poem: a complete allegorical genealogy of evil, delivered as a family grievance. Milton is about to tell us, in narrative form, exactly how sin works."
  ]
},
747: {
  s: "‘Have you forgotten me, then — and do I seem…",
  d: [
    "The reproach of a discarded lover. Satan literally does not recognize his own daughter and consort — and the forgetting is the allegory: sin never looks like sin to the sinner. What he conceived as beautiful he now sees, from the outside, as monstrous, and cannot connect the two."
  ]
},
748: {
  s: "…so foul in your eye now? — I was once thought so fair…",
  g: [["deemed", "judged, considered"]],
  d: [
    "Foul and fair in one line — the witches' chant from <i>Macbeth</i> hovers behind it. Sin's whole story turns on this hinge: evil is attractive at conception and hideous in consequence, and the same being is both, seen at different moments."
  ]
},
749: {
  s: "…in Heaven, when at the great assembly, in sight…"
},
750: {
  s: "…of all the Seraphim who had joined with you…",
  g: [["Seraphim", "the highest angelic order — here, the third of Heaven that sided with Satan"]]
},
751: {
  s: "…in bold conspiracy against Heaven's King,…"
},
752: {
  s: "…all at once a miserable pain…",
  d: [
    "The moment of Sin's conception is the moment Satan first resolved on rebellion — and it arrives as a headache. Evil begins as a thought, and the thought is already painful: Milton compresses his whole moral psychology into a birth scene."
  ]
},
753: {
  s: "…seized you; your eyes went dim, and dizzily you swam…",
  g: [["Surprised", "seized suddenly, took unawares — the older military sense"]]
},
754: {
  s: "…in darkness, while your head threw out flames thick and fast,…"
},
755: {
  s: "…until, opening wide on the left side,…",
  g: [["the left side", "the sinister side — Latin ‘sinister’ means left, the side of ill omen"]],
  d: [
    "Every detail is doubled against Scripture and myth at once. Eve will be taken from Adam's side; Sin is torn from Satan's — but from the left, the sinister side. The birth is a dark parody before it has even finished happening."
  ]
},
756: {
  s: "…one most like you in shape and bright countenance,…"
},
757: {
  s: "…then shining heavenly fair, a goddess in armour,…"
},
758: {
  s: "…I sprang out of your head. Amazement seized…",
  d: [
    "The armed goddess springing full-formed from the head is Athena from the skull of Zeus — wisdom born of the highest god. Milton inverts it: from Satan's head springs not wisdom but Sin, born at the instant rebellion was first conceived. Behind the classical parody stands James 1:15: ‘when lust hath conceived, it bringeth forth sin: and sin, when it is finished, bringeth forth death.’ The whole family history of the next sixty lines is that verse turned into narrative — desire, then sin, then death, each generating the next."
  ]
},
759: {
  s: "…all the host of Heaven; back they recoiled, afraid…"
},
760: {
  s: "…at first, and called me Sin, and took me for a sign…",
  d: [
    "Sin, sign: the pun is deliberate. The rebel angels name her and read her as a portent — and then get used to her. The next line and a half trace, in miniature, how every sin domesticates itself: shock, familiarity, pleasure."
  ]
},
761: {
  s: "…of evil omen; but once I grew familiar,…",
  g: [["Portentous", "ominous — a portent, a warning sign"]]
},
762: {
  s: "…I pleased them, and with my attractive graces won over…"
},
763: {
  s: "…even the most reluctant — you above all, who, often…",
  g: [["averse", "turned away, unwilling — from Latin ‘avertere’, to turn from"]]
},
764: {
  s: "…seeing your own perfect image in yourself reflected in me,…",
  d: [
    "Sin as self-love made literal. Satan falls in love with Sin because she is his ‘perfect image’ — he is Narcissus at the pool, enamoured of his own reflection. The line is also a blasphemous parody of the Son, who is the Father's ‘divine similitude’ and true image: where God's self-expression generates the Son in love, Satan's generates Sin in lust. Eve will have her own Narcissus moment at the pool in Book IV — but she will be turned away from the reflection; Satan embraced his."
  ]
},
765: {
  s: "…became enamoured; and you took such joy…"
},
766: {
  s: "…with me in secret that my womb conceived…",
  d: [
    "‘In secret’ — sin is furtive even in Heaven, hidden from the loyal angels and from God (so Satan thinks). The incest is the point of the allegory: evil can generate only by coupling with itself, breeding inward where creation breeds outward."
  ]
},
767: {
  s: "…a growing burden. Meanwhile war broke out,…"
},
768: {
  s: "…and battles were fought in Heaven — in which clear victory…"
},
769: {
  s: "…remained (for how could it be otherwise?) with our Almighty Foe;…",
  d: [
    "‘For what could else?’ — Sin, unlike Satan, admits the war was unwinnable from the start. The parenthesis quietly demolishes every heroic speech of the infernal council: even Hell's doorkeeper knows that against omnipotence there was never a contest."
  ]
},
770: {
  s: "…to our side, loss and rout…"
},
771: {
  s: "…through all the Empyrean. Down they fell,…",
  g: [["Empyrean", "the highest heaven of pure fire and light — from Greek ‘empyros’, fiery"]]
},
772: {
  s: "…driven headlong from the height of Heaven, down…",
  g: [["pitch", "the highest point — a term from falconry, the summit of a hawk's soaring flight"]]
},
773: {
  s: "…into this Deep; and in the general fall…"
},
774: {
  s: "…I fell too — at which time this powerful key…",
  d: [
    "The key was given ‘into my hands’ — by whom? By Heaven, as Sin will confirm later (‘by command of Heaven's all-powerful King’). God himself appoints Sin the keeper of Hell's gate, with orders to keep it forever shut. The arrangement is exquisitely apt — only sin can open the way out of Hell into the world — and it plants the question the whole episode turns on: what happens when the jailer's loyalty lies with the prisoner?"
  ]
},
775: {
  s: "…was placed in my hands, with the charge to keep…"
},
776: {
  s: "…these gates forever shut, which none can pass…"
},
777: {
  s: "…without my opening them. Here I sat brooding,…",
  g: [["Pensive", "sunk in melancholy thought"]]
},
778: {
  s: "…alone; but I had not sat long before my womb,…"
},
779: {
  s: "…pregnant by you and now grown enormous,…"
},
780: {
  s: "…felt prodigious movement and woeful birth-pangs.",
  g: [["Prodigious", "monstrous, unnatural — of the order of a prodigy or omen"], ["rueful throes", "pitiable pangs of labour"]]
},
781: {
  s: "…At last this odious offspring whom you see,…"
},
782: {
  s: "…your own begotten son, breaking his way out by violence,…",
  d: [
    "‘Thine own begotten’ — the phrase deliberately grazes ‘only begotten Son’ (John 3:16). The Father begets the Son in glory; Satan begets Death by incest with his own reflection. Milton keeps the two trinities — Father, Son, Spirit and Satan, Sin, Death — in constant blasphemous parallel."
  ]
},
783: {
  s: "…tore through my entrails, so that, distorted with fear and pain,…",
  d: [
    "The birth of Death mutilates the mother: Sin's lower body is torn and transformed into the serpent-and-hellhound shape Satan found so hideous. Sin's beauty was true at her own birth; what deformed her was her consequence. Milton took the physical model from Scylla in Ovid — the fair nymph whose loins Circe's poison turned to a girdle of barking dogs — and made the metamorphosis mean something: sin is disfigured by what it produces."
  ]
},
784: {
  s: "…all my lower shape grew…",
  g: [["nether", "lower"]]
},
785: {
  s: "…transformed as you see; but he, my inborn enemy,…",
  g: [["inbred", "bred within me — born from my own body, and my enemy from birth"]]
},
786: {
  s: "…issued forth, brandishing his fatal dart,…"
},
787: {
  s: "…made to destroy. I fled, and cried out Death!",
  d: [
    "As the host of Heaven named Sin at her birth, the mother names Death at his — but she names him in terror, fleeing her own child. The naming scene is a horror-inversion of every nativity: the first word spoken over this newborn is a scream."
  ]
},
788: {
  s: "…Hell trembled at the hideous name, and sighed…"
},
789: {
  s: "…from all her caves, and echoed back: Death!",
  d: [
    "One of the great sound effects in English poetry. ‘Death’ tolls three times in three lines — cried out, trembled at, resounded — and the last is an echo, so that Hell itself seems to repeat the word from every cave. Milton, blind, composed for the ear above all, and here the verse does what it describes: read the three lines aloud and you perform the echo. The name will not stop resounding; from this moment Death is loose in the poem's world.",
    "Sin's story pauses here on the echo. Tomorrow: what the newborn did to his mother."
  ]
},
790: {
  s: "I fled; but he pursued (though more, it seems,…"
},
791: {
  s: "…inflamed by lust than rage), and, far swifter than I,…"
},
792: {

1019: {
  s: "…or than when Ulysses on the port side steered clear of…",
  g: [["larboard", "the port (left) side of a ship"]]
},
1020: {
  s: "…Charybdis, and steered by the other whirlpool.",
  g: [["th’ other whirlpool", "Scylla — strictly a six-headed monster in Homer, but Milton lets both hazards churn as whirlpools"]]

1021: {
  s: "So he with difficulty and hard labour…",
  d: [
    "With the next line, one of the most discussed pairs in Milton. Read them together: 'So he with difficulty and labour hard / Moved on, with difficulty and labour he.' The words 'difficulty and labour' must be trudged through twice, in mirrored order, with only 'moved on' between them — the syntax makes the reader perform Satan’s slog. The chiastic frame (he…difficulty and labour / difficulty and labour…he) closes around the line like the mire around the traveler."
  ]
},
1022: {
  s: "…moved on — with difficulty and labour he moved;…",

  ]
},
1023: {
  s: "…but once he had passed, soon after, when Man fell —…"
},
1024: {
  s: "…strange transformation! — Sin and Death at full speed,…",
  g: [["amain", "at full speed, with full force"]]
},
1025: {
  s: "…following his track (for such was the will of Heaven),…",
  d: [
    "The parenthesis is a thunderclap in four quiet words: '(such was the will of Heaven).' The bridge of Sin and Death — the permanent highway of evil into our world — is built by God’s permission. Milton does not flinch from the hardest edge of his theodicy; he sets it in brackets, as an aside, which makes it more unnerving, not less. The whole problem the poem exists to 'justify' sits here in parentheses, stated and not yet explained. Books III and following take up the explanation; this line makes sure we need one."
  ]
},
1026: {
  s: "…paved after him a broad and beaten way…",
  d: [
    "'Broad and beaten way' — the adjectives are from the Gospel: 'wide is the gate, and broad is the way, that leadeth to destruction' (Matthew 7:13). What Satan crossed once with difficulty and labour hard becomes a paved thoroughfare; evil’s first passage is heroic agony, every passage after is commuting. The actual construction of this bridge is narrated in Book X — Milton flashes forward here so that Satan’s ordeal is immediately shadowed by its consequence: he suffers the crossing so that no devil ever has to again."
  ]
},
1027: {
  s: "…over the dark Abyss, whose boiling gulf…"
},
1028: {
  s: "…tamely endured a bridge of wondrous length,…",
  d: [
    "'Tamely endured' — the gulf that fought Satan with every element submits meekly to Sin and Death. Chaos got his wish at line 1009, havoc and spoil, and the price is a permanent bridge nailed across his realm: the ally of ruin ends up paved over by it."
  ]
},
1029: {
  s: "…continued from Hell all the way to the outermost sphere…",
  g: [["utmost orb", "the outermost shell of the created universe"]]
},
1030: {
  s: "…of this frail World; by which the wicked Spirits…",
  d: [
    "'This frail World' — the adjective does the mourning. Our whole universe, seen from outside, is a fragile thing with a highway from Hell now running to its outer wall. The pronoun 'this' quietly includes the reader: it is our address the road leads to."
  ]
},
1031: {

},
1032: {

},
1033: {

    "The sentence that opened the highway of Hell closes on a single clause of shelter: 'except whom / God and good Angels guard by special grace.' It is the first structural mention of grace as protection in the poem, a small lit doorway at the end of a dark corridor — and the note on which the poem itself will end its whole argument. Even here, at the bleakest logistical fact of the fallen cosmos, Milton keeps the exception clause in force."
  ]
},
1034: {
  s: "But now at last the sacred influence…",
  g: [["influence", "an inflowing — the astrological term for power streaming from heavenly bodies"]],
  d: [
    "'But now at last' — after more than a thousand lines of fire, dungeon, and dark, light re-enters the poem. Milton times the dawn to the reader’s own starvation for it; no one who has read Book II straight through meets 'the sacred influence / Of light' without physical relief. It is also the overture: Book III opens 'Hail, holy Light,' the blind poet’s invocation to what he can no longer see. The glimmer here is the first grey of that sunrise."
  ]
},
1035: {
  s: "…of light appears, and from the walls of Heaven…"
},
1036: {
  s: "…shoots far into the bosom of dim Night…"
},
1037: {
  s: "…a glimmering dawn. Here Nature first begins…",
  d: [
    "A frontier of physics as much as of geography: 'here Nature first begins her farthest verge.' Where light reaches, law begins — Nature is simply the ordered zone that Heaven’s radiance carves out of Chaos. Milton maps an idea onto space: creation is not an event that happened once but a border that holds, continuously, against the dark."
  ]
},
1038: {
  s: "…her farthest boundary, and Chaos begins to retreat…",
  g: [["verge", "edge, boundary"]]
},
1039: {
  s: "…as a beaten enemy withdraws from his outer fortifications,…",
  g: [["outmost works", "outermost fortifications of a siege-line"]],
  d: [
    "The siege metaphor makes Chaos a 'broken foe' falling back from his outworks — order and disorder locked in a war of positions at the world’s edge. It is the martial imagery of the whole book given its final application: not devil against God now, but structure against unstructure, the oldest front of all."
  ]
},
1040: {
  s: "…with less tumult and with less hostile din;…"
},
1041: {
  s: "…so that Satan, with less toil, and now with ease,…"
},
1042: {
  s: "…glides on the calmer wave by uncertain light,…",
  g: [["dubious", "uncertain, wavering — twilight neither dark nor day"]]
},
1043: {
  s: "…and, like a weather-beaten vessel, makes…",
  d: [
    "The simile is almost tender: a storm-battered ship gaining harbor with her rigging in shreds. For a moment Milton writes Satan as every sailor who ever limped home — and therein lies the trap the style keeps setting. We are made to feel relief on behalf of a voyager whose safe arrival is the worst news in the universe. The gap between the feeling and the fact is the moral instrument of the whole book."
  ]
},
1044: {
  s: "…gladly for port, though shrouds and tackle are torn;…",
  g: [["shrouds", "the ropes staying a ship’s mast — her standing rigging"]]
},
1045: {
  s: "…or, in the emptier waste that now resembles air,…"
},
1046: {
  s: "…balances his outspread wings, at leisure to behold…",
  g: [["weighs", "poises, holds balanced"]]
},
1047: {
  s: "…far off the Heaven of pure light, extended wide…",
  g: [["empyreal", "of the empyrean — the highest heaven of pure fire and light"]]
},
1048: {
  s: "…in circuit, indeterminately square or round,…",
  d: [
    "'Undetermined square or round' — Milton refuses to fix Heaven’s geometry, and the hedge is learned: Revelation’s holy city 'lieth foursquare,' while classical and Ptolemaic perfection demanded the circle. Rather than adjudicate between scripture and cosmology, he leaves the shape beyond determination — Heaven exceeds the geometries we would measure it with. Vagueness, in Milton’s sublime, is a form of precision."
  ]
},
1049: {
  s: "…adorned with opal towers and battlements…"
},
1050: {
  s: "…of living sapphire — once his native seat;…",
  d: [
    "The jewels are from Revelation 21 and from Exodus, where under God’s feet is 'a paved work of a sapphire stone' — but 'living' sapphire: Heaven’s substance is not mineral but alive. Then the clause that costs the most: 'once his native seat.' Satan is looking at home. Two words — 'once' and 'native' — carry the entire weight of exile, and Milton spends no more on them; the economy is the pathos."
  ]
},
1051: {
  s: "…and close beside it, hanging by a golden chain,…",
  d: [
    "The chain the Anarch described at line 1005, now seen: Homer’s golden cord from <i>Iliad</i> VIII, by which Zeus could haul up land and sea, transfigured into the suspension of our universe from Heaven’s wall. Centuries of allegorists had read Homer’s chain as the great bond of being, the dependence of all things on God; Milton makes the allegory literal architecture. Everything that exists for us hangs — the word is exact — on Heaven’s pleasure."
  ]
},

},

  d: [
    "The precision is an astronomer’s: stars were ranked by magnitude from first (brightest) to sixth (barely visible), and Milton — who had looked through no telescope but had met Galileo and read the new astronomy closely — picks the dimmest class, then dims it further by placing it 'close by the moon,' where moonlight would all but drown it. Our universe, from outside: the least noticeable light in the sky."
  ]
},

  s: "…Toward it, laden full with malicious revenge,…",
  g: [["fraught", "freighted, laden — a ship’s cargo word, keeping the voyage metaphor to the last"]]
},
1055: {
  s: "…accursed, and in a cursed hour, he speeds.",
  g: [["hies", "hastens, hurries"]],
  d: [
    "The last line of Book II, and the narrator’s long-withheld verdict falls like a gavel: 'Accursed, and in a cursed hour.' The polyptoton — the same curse struck twice, once on the traveler and once on the hour — seals the whole magnificent voyage inside a judgment. For two books we have watched Satan with something dangerously close to admiration: orator, monarch, explorer, survivor of the Abyss. One line weighs it all and finds it damned; 'he hies,' and the hurry itself is sinister — evil arriving early.",
    "And then Milton turns from the dark entirely. Book III opens 'Hail, holy Light' — the invocation in which the blind poet, having 'escaped the Stygian pool,' asks the light he can no longer see to shine inward. After two books composed in Hell and Chaos, the most personal lines Milton ever wrote are waiting on the other side of this page: the darkness ends where the poet’s own darkness begins to speak."
  ]

};

const NOTES_BY_BOOK = [NOTES, NOTES2];
const PLATES = ['plates/book-1.jpg', 'plates/book-2.jpg'];   // frontispieces, added as they're painted
/* every book opens with a cover page: plate + Argument; verse pages are 1..N */
BOOKS.forEach(bk => bk.pages.unshift({ cover: true }));

const verse = document.getElementById('verse');
const walkon = document.getElementById('walkon');
const where = document.getElementById('where');
const pageindex = document.getElementById('pageindex');
const pagegrid = document.getElementById('pagegrid');
const bookrow = document.getElementById('bookrow');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;
const PACE = 2200;

let book = 0, page = 0;
let visited = BOOKS.map(() => new Set());   // pages actually opened, per book
try {
  const l = JSON.parse(localStorage.getItem('pl-loc') || 'null');
  if (l) { book = l.b; page = l.p; }
  const v = JSON.parse(localStorage.getItem('pl-visited') || 'null');
  if (v) {
    visited = BOOKS.map((_, i) => new Set(v[i] || []));
  } else {
    // migrate older storage: light the trail up to the old frontier
    let f = JSON.parse(localStorage.getItem('pl-frontier') || 'null');
    if (!f && !l) {
      const old = parseInt(localStorage.getItem('pl-book1-page'));
      if (!isNaN(old)) {
        page = old;
        f = { b: 0, p: Math.max(old, parseInt(localStorage.getItem('pl-book1-max')) || 0) };
      }
    }
    if (f) for (let b = 0; b <= Math.min(f.b, BOOKS.length - 1); b++)
      for (let p = 0; p <= (b === f.b ? f.p : BOOKS[b].pages.length - 1); p++) visited[b].add(p);
  }
} catch (e) {}
/* v2: cover pages shifted verse pages up by one — migrate stored positions once */
if (!localStorage.getItem('pl-v2')) {
  if (localStorage.getItem('pl-loc') || localStorage.getItem('pl-visited') || localStorage.getItem('pl-book1-page')) {
    page += 1;
    visited = visited.map(s => new Set([...s].map(p => p + 1)));
  }
  localStorage.setItem('pl-v2', '1');
}
const saveVisited = () => localStorage.setItem('pl-visited', JSON.stringify(visited.map(s => [...s])));
const frontierLoc = () => {
  for (let b = BOOKS.length - 1; b >= 0; b--)
    if (visited[b].size) return { b, p: Math.max(...visited[b]) };
  return { b: 0, p: 0 };
};
const parseHash = () => {
  let m = location.hash.match(/^#b(\d+)p(\d+)$/);
  if (m) return { b: +m[1] - 1, p: +m[2] };   // p0 = cover, pN = verse page N
  m = location.hash.match(/^#p(\d+)$/);       // legacy Book I links
  if (m) return { b: 0, p: +m[1] };
  return null;
};
const h = parseHash();
if (h) { book = h.b; page = h.p; }
book = Math.max(0, Math.min(book || 0, BOOKS.length - 1));
page = Math.max(0, Math.min(page || 0, BOOKS[book].pages.length - 1));

let units = [], next = 0, timer = null;
let seen = false;   // was this page already visited before this arrival?

function buildUnit(text, abs) {
  const unit = document.createElement('div');
  unit.className = 'unit';
  const p = document.createElement('p');
  p.className = 'line';
  p.textContent = text;
  if (abs % 5 === 0) p.dataset.n = abs;
  unit.appendChild(p);

  const note = (NOTES_BY_BOOK[book] || {})[abs];
  if (note) {
    p.classList.add('notable');
    p.tabIndex = 0;
    p.setAttribute('role', 'button');
    p.setAttribute('aria-expanded', 'false');
    const bloom = document.createElement('div');
    bloom.className = 'bloom';
    const glosses = (note.g || []).map(([w, def]) =>
      `<div><span class="w">${w}</span> — ${def}</div>`).join('');
    const deep = (note.d || []).map(para => `<p>${para}</p>`).join('');
    bloom.innerHTML = `<div><div class="bloom-inner">
      <div class="sense">${note.s}</div>
      ${glosses ? `<div class="gloss">${glosses}</div>` : ''}
      ${deep ? `<button class="descend">go deeper</button>
      <div class="deep"><div><div class="deep-inner">${deep}</div></div></div>` : ''}
    </div></div>`;
    unit.appendChild(bloom);

    const toggle = () => {
      const wasOpen = unit.classList.contains('open');
      closeAll();
      if (!wasOpen) {
        unit.classList.add('open');
        p.setAttribute('aria-expanded', 'true');
      }
      schedule(); // pause surfacing while a bloom is open, resume on close
    };
    p.addEventListener('click', toggle);
    p.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
    });
    const descend = bloom.querySelector('.descend');
    if (descend) descend.addEventListener('click', () => {
      unit.classList.toggle('deep-open');
      descend.textContent = unit.classList.contains('deep-open') ? 'surface' : 'go deeper';
    });
  }
  return unit;
}

function closeAll() {
  document.querySelectorAll('.unit.open').forEach(u => {
    u.classList.remove('open', 'deep-open');
    u.querySelector('.line').setAttribute('aria-expanded', 'false');
    const d = u.querySelector('.descend');
    if (d) d.textContent = 'go deeper';
  });
}

function renderPage() {
  clearTimeout(timer);
  const pages = BOOKS[book].pages;
  const pg = pages[page];
  if (pg.cover) {
    where.textContent = `BOOK ${BOOKS[book].n} · THE ARGUMENT`;
  } else {
    const count = pg.b.reduce((n, b) => n + b.length, 0);
    where.textContent = `BOOK ${BOOKS[book].n} · PAGE ${page} OF ${pages.length - 1} · LINES ${pg.s}–${pg.s + count - 1}`;
  }
  prevBtn.disabled = book === 0 && page === 0;
  nextBtn.disabled = book === BOOKS.length - 1 && page === pages.length - 1;

  viewBook = book;
  renderGrid();

  verse.innerHTML = '';
  units = [];
  if (pg.cover) {   // the threshold page: plate and Argument, present at once
    const cov = document.createElement('div');
    cov.className = 'cover';
    if (PLATES[book]) {
      const pl = document.createElement('div');
      pl.className = 'unit plate surfaced';
      pl.innerHTML = `<img src="${PLATES[book]}" alt="Book ${BOOKS[book].n} plate">`;
      cov.appendChild(pl);
    }
    if (BOOKS[book].arg) {
      const a = document.createElement('div');
      a.className = 'unit argument surfaced';
      a.innerHTML = `<span class="arglabel">The Argument</span>${BOOKS[book].arg}`;
      cov.appendChild(a);
    }
    verse.appendChild(cov);
  } else {
    let abs = pg.s;
    pg.b.forEach(block => {
      const para = document.createElement('div');
      para.className = 'para';
      block.forEach(text => {
        const u = buildUnit(text, abs++);
        para.appendChild(u);
        units.push(u);
      });
      verse.appendChild(para);
    });
  }

  walkon.className = '';
  const lastPage = page === pages.length - 1;
  walkon.innerHTML = !lastPage
    ? `<button id="walk-btn">walk on ›</button>`
    : book + 1 < BOOKS.length
      ? `<button id="walk-btn">walk on · Book ${BOOKS[book + 1].n} ›</button>`
      : `<p class="fin">the end · “Through Eden took their solitary way”</p>`;
  const btn = document.getElementById('walk-btn');
  if (btn) btn.addEventListener('click', () => step(1));

  next = 0;
  /* the surfacing ritual belongs to first visits; familiar pages appear whole */
  if (RM || !units.length || seen) {
    units.forEach(u => u.classList.add('surfaced'));
    next = units.length;
    walkon.classList.add('shown');
  } else {
    timer = setTimeout(surface, 1200);
  }
}

/* the index grid can preview a book without traveling to it */
let viewBook = book;
function renderGrid() {
  const pages = BOOKS[viewBook].pages;
  const walked = i => visited[viewBook].has(i);
  pagegrid.innerHTML = '';
  for (let i = 0; i < pages.length; i++) {
    const b = document.createElement('button');
    b.textContent = i === 0 ? '✦' : i;
    b.className = (walked(i) ? 'walked' : '') + (viewBook === book && i === page ? ' here' : '');
    b.addEventListener('click', () => go(viewBook, i));
    pagegrid.appendChild(b);
  }
  [...bookrow.children].forEach((b, i) => b.className = i === viewBook ? 'here' : '');
}

function go(b, p) {
  book = Math.max(0, Math.min(b || 0, BOOKS.length - 1));
  page = Math.max(0, Math.min(p || 0, BOOKS[book].pages.length - 1));
  seen = visited[book].has(page);
  visited[book].add(page);   // every page you open joins your trail
  localStorage.setItem('pl-loc', JSON.stringify({ b: book, p: page }));
  saveVisited();
  history.replaceState(null, '', `#b${book + 1}p${page}`);
  pageindex.classList.remove('open');
  where.setAttribute('aria-expanded', 'false');
  scrollTo({ top: 0, behavior: 'auto' });
  renderPage();
}

/* one page forward or back, crossing book boundaries */
function step(dir) {
  let b = book, p = page + dir;
  if (p < 0) {
    if (b === 0) return;
    b--; p = BOOKS[b].pages.length - 1;
  } else if (p >= BOOKS[b].pages.length) {
    if (b === BOOKS.length - 1) return;
    b++; p = 0;
  }
  go(b, p);
}

/* ---- surfacing: lines emerge from the dark, one at a time ---- */
function surface() {
  if (next >= units.length) return;
  const u = units[next++];
  u.classList.add('surfaced');
  u.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  if (next >= units.length) walkon.classList.add('shown');
  schedule();
}
function schedule() {
  clearTimeout(timer);
  if (next >= units.length || document.querySelector('.unit.open')) return;
  timer = setTimeout(surface, PACE);
}

/* ---- navigation: the place-line unfolds into a page index ---- */
BOOKS.forEach((bk, i) => {
  const b = document.createElement('button');
  b.textContent = 'Book ' + bk.n;
  b.addEventListener('click', () => { viewBook = i; renderGrid(); });   // preview, don't travel
  bookrow.appendChild(b);
});
const toggleIndex = () => {
  const open = pageindex.classList.toggle('open');
  where.setAttribute('aria-expanded', open);
};
where.addEventListener('click', toggleIndex);
where.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleIndex(); }
});
prevBtn.addEventListener('click', () => step(-1));
nextBtn.addEventListener('click', () => step(1));
document.getElementById('restart').addEventListener('click', () => go(0, 0));
document.getElementById('frontier').addEventListener('click', () => {
  const f = frontierLoc();
  go(f.b, f.p);
});
document.getElementById('resetwalk').addEventListener('click', () => {
  if (!confirm('Reset your progress? Your place and every lit page return to the beginning.')) return;
  visited = BOOKS.map(() => new Set());
  localStorage.removeItem('pl-loc');
  localStorage.removeItem('pl-visited');
  localStorage.removeItem('pl-frontier');
  go(0, 0);
});
addEventListener('hashchange', () => {
  const h = parseHash();
  if (h && (h.b !== book || h.p !== page)) go(h.b, h.p);
});

/* swipe to page */
let tx = 0, ty = 0;
document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > 70 && Math.abs(dy) < 50) step(dx < 0 ? 1 : -1);
}, { passive: true });

/* tap the dark to summon the next line; double-tap to surface the whole page */
function surfaceAll() {
  clearTimeout(timer);
  units.forEach(u => u.classList.add('surfaced'));
  next = units.length;
  walkon.classList.add('shown');
}
let lastVoidTap = 0;
document.addEventListener('click', e => {
  if (e.target.closest('.unit, header, #walkon')) return;
  const now = Date.now();
  now - lastVoidTap < 350 ? surfaceAll() : surface();
  lastVoidTap = now;
});
document.addEventListener('keydown', e => {
  if (e.key === ' ' && e.target === document.body) { e.preventDefault(); surface(); }
  if (e.key === 'Escape') { closeAll(); schedule(); }
  if (e.key === 'ArrowLeft') step(-1);
  if (e.key === 'ArrowRight') step(1);
});

history.replaceState(null, '', `#b${book + 1}p${page}`);
seen = visited[book].has(page);
visited[book].add(page);
saveVisited();
renderPage();
</script>
</body>
</html>
